<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>MediaPipe Orbit Controls | Made by Mesmotronic</title>
  <link type="text/css" rel="stylesheet" href="../styles.css">
  <style>
    canvas {
      display: block;
    }

    .video-element {
      position: absolute;
      top: 0;
      left: 0;
      width: 160px;
      height: 120px;
      transform: scaleX(-1);
      z-index: 10;
    }

    .error-element {
      position: absolute;
      top: 260px;
      left: 10px;
      color: red;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      max-width: 400px;
      z-index: 10;
    }

    .status-element {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="info">
    <h1>MediaPipe Orbit Controls</h1>
    <p>Pinch and drag to move and zoom</p>
    <p><a href="https://x.com/mesmotronic" target="_blank">@mesmotronic</a> | <a href="https://github.com/mesmotronic/three-labs" target="_blank">GitHub</a></p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.180.0",
        "three/addons/": "https://esm.sh/three@0.180.0/examples/jsm/",
        "@mediapipe/tasks-vision": "https://esm.sh/@mediapipe/tasks-vision@0.10.16"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
