<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Boing Ball | Happy 40th Birthday, Commodore Amiga!</title>
  <!-- ImportMap for Three.js r177 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.177.0",
      "three/addons": "https://esm.sh/three@0.177.0/examples/jsm/",
      "@mesmotronic/three-retropass": "https://esm.sh/@mesmotronic/three-retropass@latest",
    }
  }
  </script>
</head>

<body style="margin:0; overflow:hidden; background:#cccccc;">
  <script type="module">
    import * as THREE from 'three';

    // Scene, Camera, Renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.z = 7.5;

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xcccccc, 1);
    renderer.setAnimationLoop(animate);
    document.body.appendChild(renderer.domElement);

    // Checkerboard texture creator
    function createCheckerTexture(size = 512, squares = 8) {
      const canvas = document.createElement('canvas');
      canvas.width = size * 2;
      canvas.height = size;

      const ctx = canvas.getContext('2d');
      const sq = size / squares;

      for (let y = 0; y < squares; y++) {
        for (let x = 0; x < squares * 2; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? '#ff0000' : '#ffffff';
          ctx.fillRect(x * sq, y * sq, sq, sq);
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1, 1);
      return texture;
    }
    const checkerTex = createCheckerTexture(512, 8);

    // Sphere mesh
    const radius = 1.25;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(radius, 16, 8),
      new THREE.MeshBasicMaterial({
        map: checkerTex,
      })
    );

    const sphereTilt = THREE.MathUtils.degToRad(-20);
    const sphereGroup = new THREE.Group();
    sphereGroup.add(sphere);
    sphereGroup.rotation.z = sphereTilt;
    scene.add(sphereGroup);

    scene.add(new THREE.AmbientLight(0x404040));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 5, 5);
    scene.add(dirLight);

    // Physics
    const velocity = new THREE.Vector2(0.02, 0.05);
    const gravity = 0.001;
    const bounceDamping = 1;
    const bounds = new THREE.Vector2(2.5, 1.5);

    const gridSize = 6;
    const gridDivisions = 12;

    // Floor grid on XZ plane at bottom
    const floorGrid = new THREE.GridHelper(gridSize, gridDivisions, 0xff00ff, 0xff00ff);
    floorGrid.position.y = -gridSize / 2;
    floorGrid.position.z = gridSize / 2 - 1.1;
    scene.add(floorGrid);

    // Wall grid on XY plane behind sphere
    const wallGrid = new THREE.GridHelper(gridSize, gridDivisions, 0xff00ff, 0xff00ff);
    wallGrid.rotation.x = Math.PI / 2;
    wallGrid.position.z = -1.1;
    scene.add(wallGrid);

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      sphereGroup.position.x += velocity.x;
      if (Math.abs(sphereGroup.position.x) > bounds.x) {
        sphereGroup.position.x = THREE.MathUtils.clamp(sphereGroup.position.x, -bounds.x, bounds.x);
        velocity.x *= -1;
      }

      velocity.y -= gravity;

      sphereGroup.position.y += velocity.y;

      const floorY = -bounds.y;
      if (sphereGroup.position.y < floorY) {
        const overshoot = floorY - sphereGroup.position.y;
        sphereGroup.position.y = floorY + overshoot;
        velocity.y *= -bounceDamping;
      }

      sphere.rotation.y += velocity.x > 0 ? -0.05 : 0.05;

      renderer.render(scene, camera);
    }
  </script>
</body>

</html>
